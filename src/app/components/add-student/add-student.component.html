<h2 class="mb-3">➕ Add New Student</h2>

<div *ngIf="showSuccess" class="alert alert-success">
  ✅ Student added successfully! Redirecting...
</div>

<form (ngSubmit)="onSubmit()" class="col-md-6">
  <div class="mb-2">
    <label class="form-label">First Name</label>
    <input
      type="text"
      class="form-control"
      [(ngModel)]="firstName"
      name="firstName"
      required
      placeholder="e.g. Ali"
    />
  </div>

  <div class="mb-2">
    <label class="form-label">Last Name</label>
    <input
      type="text"
      class="form-control"
      [(ngModel)]="lastName"
      name="lastName"
      required
      placeholder="e.g. Hassan"
    />
  </div>

  <div class="mb-2">
    <label class="form-label">Age</label>
    <input
      type="number"
      class="form-control"
      [(ngModel)]="age"
      name="age"
      required
      placeholder="e.g. 21"
    />
  </div>

  <div class="mb-2">
    <label class="form-label">Gender</label>
    <select class="form-select" [(ngModel)]="gender" name="gender">
      <option value="Male">Male</option>
      <option value="Female">Female</option>
    </select>
  </div>

  <div class="mb-2">
    <label class="form-label">Email</label>
    <input
      type="email"
      class="form-control"
      [(ngModel)]="email"
      name="email"
      required
      placeholder="e.g. ali@email.com"
    />
  </div>

  <div class="mb-2">
    <label class="form-label">Phone</label>
    <input
      type="text"
      class="form-control"
      [(ngModel)]="phone"
      name="phone"
      required
      placeholder="e.g. 01000000000"
    />
  </div>

  <div class="mb-2">
    <label class="form-label">Address</label>
    <input
      type="text"
      class="form-control"
      [(ngModel)]="address"
      name="address"
      placeholder="e.g. 12 Main Street"
    />
  </div>

  <div class="mb-2">
    <label class="form-label">City</label>
    <input
      type="text"
      class="form-control"
      [(ngModel)]="city"
      name="city"
      placeholder="e.g. Cairo"
    />
  </div>

  <div class="mb-2">
    <label class="form-label">Country</label>
    <input
      type="text"
      class="form-control"
      [(ngModel)]="country"
      name="country"
      placeholder="e.g. Egypt"
    />
  </div>

  <div class="mb-2">
    <label class="form-label">Department</label>
    <input
      type="text"
      class="form-control"
      [(ngModel)]="department"
      name="department"
      required
      placeholder="e.g. Computer Science"
    />
  </div>

  <div class="mb-2">
    <label class="form-label">Level</label>
    <input
      type="number"
      class="form-control"
      [(ngModel)]="level"
      name="level"
      placeholder="e.g. 3"
    />
  </div>

  <div class="mb-2">
    <label class="form-label">GPA</label>
    <input
      type="number"
      class="form-control"
      [(ngModel)]="GPA"
      name="GPA"
      required
      step="0.1"
      placeholder="e.g. 3.5"
    />
  </div>

  <div class="mb-2">
    <label class="form-label">Enrollment Date</label>
    <input
      type="date"
      class="form-control"
      [(ngModel)]="enrollmentDate"
      name="enrollmentDate"
    />
  </div>

  <div class="form-check mb-3">
    <input
      type="checkbox"
      class="form-check-input"
      [(ngModel)]="isActive"
      name="isActive"
      [checked]="isActive"
    />
    <label class="form-check-label">Active Student</label>
  </div>

  <button
    type="submit"
    class="btn btn-success"
    [disabled]="
      !firstName || !lastName || !age || !email || !department || !GPA
    "
  >
    ✅ Add Student
  </button>
</form>
